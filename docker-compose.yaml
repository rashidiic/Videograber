services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-video-mp3-bot:latest
    container_name: telegram-video-mp3-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TMP_DIR: /app/storage/tmp
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - bot_tmp:/app/storage/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_tmp: